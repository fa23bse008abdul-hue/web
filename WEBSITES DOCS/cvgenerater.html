<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container py-5">
  <h1 class="text-center mb-4">CV Generator</h1>
  
  <!-- Input Form -->
  <div class="card p-4 mb-4">
    <form id="cvForm">
      <h4>Personal Information</h4>
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="name" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" required>
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Phone</label>
          <input type="text" class="form-control" id="phone" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Address</label>
          <input type="text" class="form-control" id="address" required>
        </div>
      </div>

      <h4>Education</h4>
      <div class="mb-3">
        <label class="form-label">Degree</label>
        <input type="text" class="form-control" id="degree" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Institution</label>
        <input type="text" class="form-control" id="institution" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Year</label>
        <input type="text" class="form-control" id="year" required>
      </div>

      <h4>Skills</h4>
      <div class="mb-3">
        <textarea class="form-control" id="skills" rows="3" placeholder="e.g. HTML, CSS, JavaScript"></textarea>
      </div>

      <button type="submit" class="btn btn-primary">Generate CV</button>
    </form>
  </div>

  <!-- CV Preview -->
  <div id="cvPreview" class="card p-4 d-none">
    <div class="text-end mb-3">
      <button class="btn btn-success" onclick="downloadCV()">Download PDF</button>
    </div>
    <div id="cvContent"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
